$kind: http-request
description: Возвращает количество и сумму приходов/расходов за текущий день.
url: "{{baseUrl}}/api/stats/today"
method: GET
headers:
  Accept: application/json
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Статистика за сегодня.resources/examples
order: 1000
