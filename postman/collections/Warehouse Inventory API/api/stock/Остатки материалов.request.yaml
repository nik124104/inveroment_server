$kind: http-request
description: Возвращает список всех материалов с текущими остатками.
url: "{{baseUrl}}/api/stock?only_positive=false"
method: GET
headers:
  Accept: application/json
queryParams:
  only_positive: "false"
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Остатки материалов.resources/examples
order: 3000
