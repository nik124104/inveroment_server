$kind: http-example
request:
  url: "{{baseUrl}}/api/stock/:material_id"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    material_id: "1990"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: ""
order: 1000
