$kind: http-request
description: Возвращает остаток конкретного материала по его ID.
url: "{{baseUrl}}/api/stock/:material_id"
method: GET
headers:
  Accept: application/json
pathVariables:
  material_id: "1990"
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Остаток материала.resources/examples
order: 1000
