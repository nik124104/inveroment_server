$kind: http-example
request:
  url: "{{baseUrl}}/api/auth/me"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": 9740,
        "login": "string",
        "role": "string",
        "full_name": null
      }
order: 1000
