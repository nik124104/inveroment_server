$kind: http-request
description: Смена пароля.
url: "{{baseUrl}}/api/auth/change-password?old_password=string&new_password=string"
method: POST
headers:
  Accept: application/json
queryParams:
  old_password: string
  new_password: string
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Change Password.resources/examples
order: 1000
