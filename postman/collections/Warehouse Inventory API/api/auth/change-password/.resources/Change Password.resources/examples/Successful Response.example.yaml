$kind: http-example
request:
  url: "{{baseUrl}}/api/auth/change-password?old_password=string&new_password=str\
    ing"
  method: POST
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    old_password: string
    new_password: string
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: ""
order: 1000
