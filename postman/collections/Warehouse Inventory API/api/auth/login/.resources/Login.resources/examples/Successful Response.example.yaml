$kind: http-example
request:
  url: "{{baseUrl}}/api/auth/login"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "login": "string",
        "password": "string"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "token": "string",
        "user_id": 5058,
        "login": "string",
        "role": "string",
        "full_name": null
      }
order: 1000
