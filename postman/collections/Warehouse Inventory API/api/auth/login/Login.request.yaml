$kind: http-request
description: Авторизация пользователя. Возвращает JWT токен.
url: "{{baseUrl}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "login": "string",
      "password": "string"
    }
examples: ./.resources/Login.resources/examples
order: 1000
