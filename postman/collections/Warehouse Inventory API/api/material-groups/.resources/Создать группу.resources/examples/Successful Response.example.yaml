$kind: http-example
request:
  url: "{{baseUrl}}/api/material-groups/"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "name": "string",
        "parent_id": 1918
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": 8128,
        "name": "string",
        "parent_id": 2292,
        "parent_name": "string",
        "children_count": 0,
        "created_at": "2013-08-22T09:08:16.109Z"
      }
order: 1000
