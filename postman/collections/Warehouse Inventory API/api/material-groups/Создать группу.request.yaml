$kind: http-request
description: Создание новой группы материалов (требует прав администратора)
url: "{{baseUrl}}/api/material-groups/"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "name": "string",
      "parent_id": 1918
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Создать группу.resources/examples
order: 4000
