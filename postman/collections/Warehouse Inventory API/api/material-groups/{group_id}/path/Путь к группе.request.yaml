$kind: http-request
description: Возвращает путь от корня до указанной группы
url: "{{baseUrl}}/api/material-groups/:group_id/path"
method: GET
headers:
  Accept: application/json
pathVariables:
  group_id: "9502"
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Путь к группе.resources/examples
order: 1000
