$kind: http-request
description: Удаление группы материалов (требует прав администратора)
url: "{{baseUrl}}/api/material-groups/:group_id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  group_id: "9502"
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Удалить группу.resources/examples
order: 5000
