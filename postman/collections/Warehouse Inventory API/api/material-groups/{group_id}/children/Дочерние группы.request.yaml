$kind: http-request
description: Возвращает дочерние группы указанной группы
url: "{{baseUrl}}/api/material-groups/:group_id/children"
method: GET
headers:
  Accept: application/json
pathVariables:
  group_id: "9502"
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Дочерние группы.resources/examples
order: 1000
