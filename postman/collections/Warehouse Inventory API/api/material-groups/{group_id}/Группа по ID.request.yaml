$kind: http-request
description: Возвращает информацию о группе материалов
url: "{{baseUrl}}/api/material-groups/:group_id"
method: GET
headers:
  Accept: application/json
pathVariables:
  group_id: "9502"
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Группа по ID.resources/examples
order: 3000
