$kind: http-request
description: Обновление информации о группе (требует прав администратора)
url: "{{baseUrl}}/api/material-groups/:group_id"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  group_id: "9502"
body:
  type: json
  content: |-
    {
      "name": "string",
      "parent_id": null
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Обновить группу.resources/examples
order: 4000
