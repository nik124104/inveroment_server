$kind: http-example
request:
  url: "{{baseUrl}}/api/material-groups/tree"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      [
        {
          "id": 2264,
          "name": "string",
          "parent_id": 2021,
          "level": 0
        },
        {
          "id": 9890,
          "name": "string",
          "parent_id": 4559,
          "level": 0
        }
      ]
order: 1000
