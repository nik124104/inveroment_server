$kind: http-request
description: Возвращает историю операций по конкретному материалу.
url: "{{baseUrl}}/api/transactions/material/:material_id?limit=50"
method: GET
headers:
  Accept: application/json
queryParams:
  limit: "50"
pathVariables:
  material_id: "1990"
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Движения материала.resources/examples
order: 1000
