$kind: http-request
description: Возвращает список всех операций (приходов и расходов) с пагинацией.
url: "{{baseUrl}}/api/transactions?limit=100&offset=0"
method: GET
headers:
  Accept: application/json
queryParams:
  limit: "100"
  offset: "0"
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/История операций.resources/examples
order: 2000
